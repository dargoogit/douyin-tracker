<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Test</title>
<style>body{font-family:sans-serif;padding:2em;text-align:center}
.ok{color:green;font-size:3em}</style></head>
<body>
<h1>✅ Vercel 静态页面 — 通了</h1>
<p>如果看到这个说明静态资源服务正常</p>
<hr>
<button onclick="testAPI()">测试 /api/ping</button>
<pre id="result"></pre>
<script>
async function testAPI(){
  const el=document.getElementById("result");
  el.textContent="请求中...";
  try{
    const r=await fetch("/api/ping");
    const d=await r.json();
    el.textContent=JSON.stringify(d,null,2);
  }catch(e){
    el.textContent="❌ 请求失败: "+e.message;
  }
}
</script>
</body></html>
